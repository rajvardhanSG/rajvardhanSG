name: GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight UTC
  workflow_dispatch:        # Allows manual trigger from Actions tab
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate GitHub Stats SVGs

    steps:
      - uses: actions/checkout@v4

      - uses: jstrieb/github-stats@master
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          # Optional: include private repos in stats
          # INCLUDE_FORKED_REPOS: true
          # EXCLUDED: "repo1,repo2"   # comma-separated repos to exclude

      - name: Move generated SVGs
        run: |
          mkdir -p github-stats
          mv generated/overview.svg github-stats/overview.svg || true
          mv generated/languages.svg github-stats/languages.svg || true

      - name: Commit and push SVGs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add github-stats/
          git commit -m "chore: update GitHub stats SVGs [skip ci]" || echo "Nothing to commit"
          git push
